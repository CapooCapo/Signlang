
networks:
  signnet:

services:
  # ---------- DATABASE ----------
  db:
    image: mysql:8
    container_name: signlang-db-1
    environment:
      MYSQL_DATABASE: signlang
      MYSQL_USER: sign
      MYSQL_PASSWORD: signpass
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [signnet]

  # ---------- REDIS ----------
  redis:
    image: redis:7
    container_name: signlang-redis-1
    ports:
      - "6379:6379"
    networks: [signnet]

  # ---------- API (Django) ----------
  api:
    build: ./apps/api
    container_name: signlang-api-1
    working_dir: /app
    environment:
      DJANGO_SETTINGS_MODULE: backend.settings
      DB_ENGINE: django.db.backends.mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: signlang
      DB_USER: sign
      DB_PASSWORD: signpass
      REDIS_URL: redis://redis:6379/0
      ML_BASE_URL: http://ml:9000
      CORS_ALLOWED_ORIGINS: http://localhost:4200
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    command: >
      bash -lc "
      python -m pip install -U pip &&
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - ./apps/api:/app
      # Nếu muốn file sinh ra không bị root, bỏ comment dòng sau và export UID/GID trước khi up
      # user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ml:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 25s
    networks: [signnet]

  # ---------- ML SERVICE (Uvicorn/FastAPI) ----------
  ml:
    build: ./ml/service
    container_name: signlang-ml-1
    working_dir: /app
    environment:
      MODEL_NAME: asl_letters
      MODEL_VERSION: "1.0.0"
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      # Bật nếu host FS không hỗ trợ inotify tốt:
      # WATCHFILES_FORCE_POLLING: "true"
    command: >
      bash -lc "
      pip install -r requirements.txt &&
      uvicorn app:app --host 0.0.0.0 --port 9000 --reload
      "
    volumes:
      - ./ml/service:/app
      - ./ml/models:/models
      # user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9000/health || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 10
      start_period: 20s
    networks: [signnet]

  # ---------- FRONTEND (Angular) ----------
  web:
   image: node:20-slim
   container_name: signlang-web-dev
   working_dir: /app
   environment:
     API_BASE: "http://host.docker.internal:8000/api/v1"
     WS_URL: "ws://host.docker.internal:8000/ws"
     CHOKIDAR_USEPOLLING: "true"
   command: >
     sh -lc "
       [ -d node_modules ] || npm install &&
       npx ng serve --host 0.0.0.0 --port 4200 --poll 1500
     "
   volumes:
     - ./apps/web:/app
     - /app/node_modules
   ports:
     - "4200:4200"
   depends_on:
     api:
       condition: service_started
   networks: [signnet]

