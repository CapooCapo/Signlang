version: "3.9"

name: signlang

x-env: &default-env
  TZ: Asia/Ho_Chi_Minh

services:
  # ---------- FRONTEND (Angular) ----------
  web:
    build: ./apps/web
    command: sh entrypoint.sh
    working_dir: /app
    environment:
      <<: *default-env
      # Dev: gọi thẳng API & WS qua cổng 8000
      API_BASE: "http://localhost:8000/api/v1"
      WS_URL: "ws://localhost:8000/ws"
    volumes:
      - ./apps/web:/app
    ports:
      - "4200:4200"      # ng serve
    depends_on:
      api:
        condition: service_started
    networks: [ signnet ]

  # ---------- BACKEND (Django + DRF + Channels) ----------
  api:
    build: ./apps/api
    command: sh entrypoint.sh
    working_dir: /app
    env_file: .env
    environment:
      <<: *default-env
      DJANGO_SETTINGS_MODULE: backend.settings
      DB_ENGINE: django.db.backends.mysql
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: signlang
      DB_USER: sign
      DB_PASSWORD: signpass
      REDIS_URL: "redis://redis:6379/0"
      ML_BASE_URL: "http://ml:9000"
      INTERNAL_TOKEN: "${INTERNAL_TOKEN:-supersecret-only-inside}"
      # CORS cho Angular dev
      CORS_ALLOWED_ORIGINS: "http://localhost:4200"
    volumes:
      - ./apps/api:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      ml:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 10
    networks: [ signnet ]

  # ---------- ML SERVICE (FastAPI / ONNX / Torch) ----------
  ml:
    build: ./ml/service
    command: uvicorn app:app --host 0.0.0.0 --port 9000
    working_dir: /app
    environment:
      <<: *default-env
      MODEL_NAME: asl_letters
      MODEL_VERSION: "1.0.0"
      INTERNAL_TOKEN: "${INTERNAL_TOKEN:-supersecret-only-inside}"
    volumes:
      - ./ml/service:/app
      - ./ml/models:/models
    ports:
      - "9000:9000"    # chỉ mở dev; prod giữ trong mạng nội bộ
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/docs"]
      interval: 20s
      timeout: 3s
      retries: 10
    networks: [ signnet ]

  # ---------- DATABASE (MySQL) ----------
  db:
    image: mysql:8.4
    environment:
      <<: *default-env
      MYSQL_DATABASE: signlang
      MYSQL_USER: sign
      MYSQL_PASSWORD: signpass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"   # dev; có thể tắt ở prod
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [ signnet ]

  # ---------- REDIS (queue + cache) ----------
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    networks: [ signnet ]

  # ---------- OPTIONAL: Mongo cho log frame/keypoints ----------
  # mongo:
  #   image: mongo:7
  #   volumes:
  #     - mongodata:/data/db
  #   ports:
  #     - "27017:27017"
  #   networks: [ signnet ]

  # ---------- OPTIONAL: Gateway Nginx (bật khi muốn 1 cổng 80) ----------
  # nginx:
  #   image: nginx:alpine
  #   volumes:
  #     - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #   ports:
  #     - "80:80"
  #   depends_on:
  #     web:
  #       condition: service_started
  #     api:
  #       condition: service_started
  #   networks: [ signnet ]

volumes:
  dbdata:
  redisdata:
  mongodata:

networks:
  signnet:
    driver: bridge

