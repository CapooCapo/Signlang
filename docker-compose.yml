networks:
  signlang_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  angular_cache:

services:
  db:
    image: postgres:15-alpine
    container_name: signlang-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-signlang}
      POSTGRES_USER: ${DB_USER:-signuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-signpass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - signlang_net

  redis:
    image: redis:alpine
    container_name: signlang-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - signlang_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: signlang-api
    restart: unless-stopped
    volumes:
      - ./apps/api:/app
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    environment:
      - DJANGO_SETTINGS_MODULE=backend.settings
      - DJANGO_SECRET_KEY=${DJANGO_SECRET:-dev-secret}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-1}
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=${DB_NAME:-signlang}
      - DB_USER=${DB_USER:-signuser}
      - DB_PASSWORD=${DB_PASSWORD:-signpass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - ML_SERVICE_URL=http://ml:9000
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/firebase-service-account.json
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - signlang_net

  ml:
    build:
      context: ./ml/service
    container_name: signlang-ml
    restart: unless-stopped
    volumes:
      - ./ml/service:/app
      - ./ml/models:/models
    environment:
      - MODEL_NAME=${ML_MODEL_NAME:-asl_letters}
      - MODEL_VERSION=${ML_MODEL_VERSION:-1.0.0}
    ports:
      - "${ML_PORT:-9000}:9000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/health/" ]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - signlang_net

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      target: development
    container_name: signlang-web
    restart: unless-stopped
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - angular_cache:/app/.angular
    environment:
      - API_URL=http://localhost:${API_PORT:-8000}/api/v1
      - GOOGLE_CLIENT_ID=${ANGULAR_GOOGLE_CLIENT_ID}
    ports:
      - "${WEB_PORT:-4200}:4200"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - signlang_net
